services:
  app:
    hostname: app
    container_name: app
    build:
      dockerfile: Dockerfile.dev
    restart: always
    ports:
      - 8000:8000
    env_file:
      - ./.env
    depends_on:
      db:
        condition: service_healthy
    networks:
      - fastapi_demo_net
    logging:
      driver: "json-file"
      options:
        tag: "{{.Name}}"

  db:
    image: postgres:18.1
    hostname: postgres_db
    container_name: postgres_db
    restart: always
    user: ${POSTGRES_USER}
    ports:
      - 5432:5432
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres-db:/var/lib/postgresql
    networks:
      - fastapi_demo_net
    healthcheck:
      test: ["CMD", "pg_isready"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:5.4.1
    hostname: adminer
    container_name: adminer
    restart: always
    ports:
      - 8080:8080
    environment:
      - ADMINER_DEFAULT_SERVER=postgres_db
      - ADMINER_DESIGN=hever
    networks:
      - fastapi_demo_net

  redis:
    image: redis:8.6.1-alpine
    hostname: redis
    container_name: redis
    restart: always
    ports:
      - 6379:6379
    networks:
      - fastapi_demo_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  loki:
    image: grafana/loki:3.7.1
    container_name: loki
    ports:
      - 3100:3100
    networks:
      - fastapi_demo_net

  promtail:
    image: grafana/promtail:3.6.8
    user: root
    container_name: promtail
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./promtail-config.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    networks:
      - fastapi_demo_net

  grafana:
    image: grafana/grafana:12.4.2
    container_name: grafana
    ports:
      - 3000:3000
    networks:
      - fastapi_demo_net

volumes:
  postgres-db:

networks:
  fastapi_demo_net:
    name: fastapi_demo_net
